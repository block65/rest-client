name: Unit Tests (PR)

on:
  pull_request:
    branches: ["canary", "master"]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        version: [26]
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.version }}
          cache: "pnpm"

      - run: make test typecheck
